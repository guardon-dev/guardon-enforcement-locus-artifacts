apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-app-26
spec:
  selector:
    matchLabels:
      app: resource-app-26
  template:
    metadata:
      labels:
        app: resource-app-26
    spec:
      containers:
      - name: app
        image: nginx
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
