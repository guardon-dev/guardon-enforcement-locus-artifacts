apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-app-24
spec:
  selector:
    matchLabels:
      app: resource-app-24
  template:
    metadata:
      labels:
        app: resource-app-24
    spec:
      containers:
      - name: app
        image: nginx
        resources:
          requests:
            cpu: "0"
            memory: "0"
          limits:
            cpu: "0"
            memory: "0"
